name: Release

on:
  push:
    branches:
      - main
      - beta
      - alpha

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write   # npm provenance

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:coverage

  release:
    name: Semantic Release → npm
    runs-on: ubuntu-latest
    needs: test
    environment: npm-publish

    outputs:
      released: ${{ steps.release.outputs.new_release_published }}
      version:  ${{ steps.release.outputs.new_release_version }}
      channel:  ${{ steps.release.outputs.new_release_channel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Sync branch with remote
        run: |
          git pull --rebase origin ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # Sin registry-url: evita que setup-node genere un .npmrc temporal
          # con always-auth=true que interfiere con el NPM_TOKEN de semantic-release.

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify npm token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ ! "$NPM_TOKEN" =~ ^npm_ ]]; then
            echo "::error::NPM_TOKEN debe empezar con 'npm_'. Ve a npmjs.com → Access Tokens → Generate New Token → Automation."
            exit 1
          fi
          # Verificar con curl directamente — sin depender del .npmrc del runner
          WHOAMI=$(curl -sf \
            -H "Authorization: Bearer $NPM_TOKEN" \
            https://registry.npmjs.org/-/whoami 2>/dev/null | grep -o '"username":"[^"]*"' | cut -d'"' -f4)
          if [ -z "$WHOAMI" ]; then
            echo "::error::NPM_TOKEN inválido o revocado. Genera un nuevo Automation token en npmjs.com."
            exit 1
          fi
          echo "✓ Token válido — usuario: $WHOAMI"

      - name: Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 25
          extra_plugins: |
            @semantic-release/git@10
            @semantic-release/changelog@6
            conventional-changelog-conventionalcommits@8
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release summary
        if: steps.release.outputs.new_release_published == 'true'
        run: |
          echo "## 🚀 Released!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.release.outputs.new_release_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Channel:** \`${{ steps.release.outputs.new_release_channel || 'latest' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 [@varbyte/treebound on npm](https://www.npmjs.com/package/@varbyte/treebound)" >> $GITHUB_STEP_SUMMARY

      - name: No release
        if: steps.release.outputs.new_release_published == 'false'
        run: |
          echo "## ℹ️ No release triggered" >> $GITHUB_STEP_SUMMARY
          echo "No commits since last release trigger a version bump." >> $GITHUB_STEP_SUMMARY
