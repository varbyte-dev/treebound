name: Release

on:
  push:
    branches:
      - main
      - beta
      - alpha

# Solo puede correr una release a la vez
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write        # crear tags y commits de release
  issues: write          # comentar en issues relacionados
  pull-requests: write   # comentar en PRs relacionados

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # En CI no hay credenciales de Azure — instalamos sin el registry de Azure
      # ya que todas las deps están en npm público
      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          # Evitar que npm intente autenticar contra Azure para instalar devDeps
          npm_config_registry: https://registry.npmjs.org/

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test:coverage

  release:
    name: Semantic Release → Azure Artifacts
    runs-on: ubuntu-latest
    needs: test
    environment: azure-publish

    outputs:
      released: ${{ steps.release.outputs.new_release_published }}
      version:  ${{ steps.release.outputs.new_release_version }}
      channel:  ${{ steps.release.outputs.new_release_channel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts
        env:
          npm_config_registry: https://registry.npmjs.org/

      - name: Build
        run: npm run build

      # Azure Artifacts autentica con un PAT de Azure DevOps.
      # El token se codifica en base64 del string ":<PAT>" (con los dos puntos).
      # Se escribe en ~/.npmrc en runtime — nunca en el repo.
      #
      # IMPORTANTE: el heredoc usa printf línea a línea para evitar que la
      # indentación del YAML introduzca espacios en las claves del .npmrc,
      # lo que causaría un 401 silencioso.
      - name: Configure Azure Artifacts authentication
        env:
          AZURE_PAT: ${{ secrets.AZURE_ARTIFACTS_PAT }}
        run: |
          # El secret AZURE_ARTIFACTS_PAT debe ser el PAT raw de Azure DevOps.
          # NO en base64 — el workflow hace base64(":<PAT>") aquí mismo.
          # Para obtener el PAT raw si solo tienes el base64:
          #   echo "<tu_base64>" | base64 -d
          ENCODED=$(printf ':%s' "$AZURE_PAT" | base64 | tr -d '\n')
          REGISTRY="//pkgs.dev.azure.com/varbytedev/_packaging/varbytedev/npm"

          printf '%s:username=varbytedev\n'    "${REGISTRY}/registry/" >> ~/.npmrc
          printf '%s:_password=%s\n'           "${REGISTRY}/registry/" "$ENCODED" >> ~/.npmrc
          printf '%s:email=ci@varbyte.dev\n'   "${REGISTRY}/registry/" >> ~/.npmrc
          printf '%s:always-auth=true\n'       "${REGISTRY}/registry/" >> ~/.npmrc
          printf '%s/:username=varbytedev\n'   "$REGISTRY"             >> ~/.npmrc
          printf '%s/:_password=%s\n'          "$REGISTRY"             "$ENCODED" >> ~/.npmrc
          printf '%s/:email=ci@varbyte.dev\n'  "$REGISTRY"             >> ~/.npmrc
          printf '%s/:always-auth=true\n'      "$REGISTRY"             >> ~/.npmrc

      - name: Verify registry access
        env:
          AZURE_PAT: ${{ secrets.AZURE_ARTIFACTS_PAT }}
        run: |
          ENCODED=$(printf ':%s' "$AZURE_PAT" | base64 | tr -d '\n')
          npm ping \
            --registry https://pkgs.dev.azure.com/varbytedev/_packaging/varbytedev/npm/registry/ \
            "--//pkgs.dev.azure.com/varbytedev/_packaging/varbytedev/npm/registry/:_password=$ENCODED" \
            "--//pkgs.dev.azure.com/varbytedev/_packaging/varbytedev/npm/registry/:username=varbytedev" \
            "--//pkgs.dev.azure.com/varbytedev/_packaging/varbytedev/npm/registry/:always-auth=true"

      - name: Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 25
          extra_plugins: |
            @semantic-release/git@10
            @semantic-release/changelog@6
            conventional-changelog-conventionalcommits@8
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          # semantic-release/npm lee NPM_TOKEN como _authToken
          # Para Azure usamos _password, así que desactivamos el NPM_TOKEN
          # y dejamos que el .npmrc del HOME maneje la autenticación
          NPM_TOKEN: ${{ secrets.AZURE_ARTIFACTS_PAT }}

      - name: Release summary
        if: steps.release.outputs.new_release_published == 'true'
        run: |
          echo "## 🚀 Released!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.release.outputs.new_release_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Channel:** \`${{ steps.release.outputs.new_release_channel || 'latest' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 [Azure Artifacts — varbytedev feed](https://pkgs.dev.azure.com/varbytedev/_packaging/varbytedev/npm/registry/)" >> $GITHUB_STEP_SUMMARY

      - name: No release
        if: steps.release.outputs.new_release_published == 'false'
        run: |
          echo "## ℹ️ No release triggered" >> $GITHUB_STEP_SUMMARY
          echo "No commits since last release trigger a version bump." >> $GITHUB_STEP_SUMMARY
