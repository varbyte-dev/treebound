<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TreeBound — Playground</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #0f0f13;
        color: #e2e8f0;
        min-height: 100vh;
        padding: 2rem;
      }

      header {
        text-align: center;
        margin-bottom: 3rem;
      }

      header h1 {
        font-size: 2.5rem;
        font-weight: 800;
        background: linear-gradient(135deg, #6ee7f7, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -1px;
      }

      header p {
        color: #94a3b8;
        margin-top: 0.5rem;
        font-size: 1rem;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
        gap: 1.5rem;
        max-width: 1200px;
        margin: 0 auto;
      }

      .card {
        background: #1e1e2e;
        border: 1px solid #2d2d44;
        border-radius: 12px;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      .card h2 {
        font-size: 1rem;
        font-weight: 600;
        color: #a78bfa;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .card h2 span.badge {
        background: #312e81;
        color: #c4b5fd;
        font-size: 0.65rem;
        padding: 2px 8px;
        border-radius: 999px;
        font-weight: 500;
        letter-spacing: 0;
        text-transform: none;
      }

      .demo-area {
        background: #13131f;
        border-radius: 8px;
        padding: 1rem;
        flex: 1;
      }

      /* Estilos expuestos a los custom elements en light-dom */
      user-card-demo,
      todo-list-demo,
      user-form-demo,
      counter-demo,
      conditional-demo {
        display: block;
      }

      /* Estilos para el contenido de los componentes (light DOM) */
      .component-card {
        background: #1a1a2e;
        border: 1px solid #2d2d44;
        border-radius: 8px;
        padding: 1rem;
      }

      .component-card h3 {
        color: #6ee7f7;
        margin-bottom: 0.5rem;
        font-size: 1.1rem;
      }

      .component-card p {
        color: #cbd5e1;
        font-size: 0.9rem;
        line-height: 1.5;
      }

      .component-card .admin-badge {
        display: inline-block;
        background: #7c3aed;
        color: #ede9fe;
        font-size: 0.75rem;
        padding: 2px 10px;
        border-radius: 999px;
        margin-top: 0.3rem;
      }

      .component-card input[type="text"],
      .component-card input[type="email"],
      .component-card input[type="number"] {
        width: 100%;
        background: #0f0f18;
        border: 1px solid #3d3d5c;
        border-radius: 6px;
        color: #e2e8f0;
        padding: 0.4rem 0.7rem;
        font-size: 0.9rem;
        margin-top: 0.5rem;
        outline: none;
      }

      .component-card input:focus {
        border-color: #7c3aed;
      }

      button {
        background: #4c1d95;
        color: #ede9fe;
        border: none;
        border-radius: 6px;
        padding: 0.4rem 0.9rem;
        font-size: 0.85rem;
        cursor: pointer;
        transition: background 0.15s;
      }

      button:hover { background: #5b21b6; }

      .todo-item {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 0;
        border-bottom: 1px solid #2d2d44;
        font-size: 0.9rem;
        color: #cbd5e1;
      }

      .todo-item:last-child { border-bottom: none; }

      .todo-item.done span { text-decoration: line-through; opacity: 0.5; }

      .todo-item input[type="checkbox"] { accent-color: #7c3aed; cursor: pointer; }

      ul { list-style: none; }

      .counter-display {
        font-size: 3rem;
        font-weight: 800;
        text-align: center;
        color: #6ee7f7;
        padding: 1rem 0;
      }

      .counter-controls {
        display: flex;
        gap: 0.5rem;
        justify-content: center;
      }

      .btn-danger { background: #7f1d1d; }
      .btn-danger:hover { background: #991b1b; }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.25rem;
        margin-bottom: 0.75rem;
      }

      .form-group label {
        font-size: 0.8rem;
        color: #94a3b8;
        font-weight: 500;
      }

      .json-preview {
        background: #0d0d17;
        border-radius: 6px;
        padding: 0.75rem;
        font-family: 'Fira Code', monospace;
        font-size: 0.8rem;
        color: #a78bfa;
        white-space: pre;
        overflow-x: auto;
        margin-top: 0.5rem;
      }

      .items-list li {
        padding: 0.3rem 0.5rem;
        font-size: 0.85rem;
        color: #cbd5e1;
        border-bottom: 1px solid #2d2d44;
      }

      .items-list li:last-child { border-bottom: none; }

      .items-list li span.index {
        color: #6ee7f7;
        font-weight: 600;
        margin-right: 0.5rem;
      }

      .items-list li span.price {
        float: right;
        color: #a78bfa;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>🌲 TreeBound</h1>
      <p>Motor de binding reactivo para Custom Elements — Playground interactivo</p>
    </header>

    <div class="grid">

      <!-- Ejemplo 1: User Card -->
      <div class="card">
        <h2>User Card <span class="badge">text binding + *if</span></h2>
        <div class="demo-area">
          <user-card-demo></user-card-demo>
        </div>
      </div>

      <!-- Ejemplo 2: Counter -->
      <div class="card">
        <h2>Counter <span class="badge">reactivity + events</span></h2>
        <div class="demo-area">
          <counter-demo></counter-demo>
        </div>
      </div>

      <!-- Ejemplo 3: Todo List -->
      <div class="card">
        <h2>Todo List <span class="badge">*for + two-way</span></h2>
        <div class="demo-area">
          <todo-list-demo></todo-list-demo>
        </div>
      </div>

      <!-- Ejemplo 4: User Form -->
      <div class="card">
        <h2>User Form <span class="badge">two-way binding</span></h2>
        <div class="demo-area">
          <user-form-demo></user-form-demo>
        </div>
      </div>

      <!-- Ejemplo 5: Conditional + *for con índice -->
      <div class="card">
        <h2>Products <span class="badge">*if + *for + index</span></h2>
        <div class="demo-area">
          <conditional-demo></conditional-demo>
        </div>
      </div>

      <!-- Ejemplo 6: TreeBoundEngine directo -->
      <div class="card">
        <h2>Direct Engine <span class="badge">sin custom element</span></h2>
        <div class="demo-area">
          <div id="direct-engine-mount"></div>
        </div>
      </div>

    </div>

    <script type="module" src="/examples/main.ts"></script>
  </body>
</html>
